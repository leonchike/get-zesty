name = "recipe-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RecipeMCP"]

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "RecipeMCP"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "aa8bce4a7aa34c9c97a4788c76704929"

[observability]
enabled = true

[dev]
port = 8793

[version_metadata]
binding = "CF_VERSION_METADATA"

# Environment Variables (use wrangler secret put for sensitive values)
# Required secrets:
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - COOKIE_ENCRYPTION_KEY
# - RECIPE_API_KEY
# - RECIPE_API_BASE_URL
# Optional secrets:
# - SENTRY_DSN
